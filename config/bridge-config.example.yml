# Discord-Harmony Bridge Configuration

# Discord Bot Configuration
discord:
  token: "YOUR_DISCORD_BOT_TOKEN"
  guildId: "YOUR_DISCORD_SERVER_ID"

# Harmony Bot Configuration
# gatewayUrl and apiUrl both point at the Harmony bot-gateway (default port 3002).
# When hosting the bridge remotely, use your public proxy, e.g.
#   gatewayUrl: "wss://chat.example.com/bot-gateway/gateway"
#   apiUrl:     "https://chat.example.com/bot-gateway/api/v1"
harmony:
  token: "YOUR_HARMONY_BOT_TOKEN"
  gatewayUrl: "ws://localhost:3002/gateway"
  apiUrl: "http://localhost:3002/api/v1"
  serverId: "YOUR_HARMONY_SERVER_UUID"  # Required for Discord autocomplete of Harmony users
  baseUrl: "https://chat.example.com"   # Your Harmony instance URL (for federated mentions)

# Channel Mappings
# Each mapping connects a Discord channel to a Harmony channel
channelMappings:
  - discord: "1234567890"  # Discord channel ID
    harmony: "uuid-here"   # Harmony channel ID
    bidirectional: true    # If false, only Discord -> Harmony
    name: "general"        # Human-friendly name (optional)
  
  # Add more mappings as needed
  # - discord: "0987654321"
  #   harmony: "uuid-here-2"
  #   bidirectional: true
  #   name: "announcements"

# Bridge Settings
settings:
  syncAttachments: true    # Bridge file attachments
  syncReactions: true      # Bridge reactions (now implemented!)
  syncEdits: false         # Bridge message edits (requires message ID mapping)
  syncDeletes: false       # Bridge message deletes (requires message ID mapping)
  mentionTranslation: true # Translate @mentions between platforms

