# https://github.com/y4my4my4m/harmony-discord-bridge
# URL examples are in README.md — uncomment the block that matches your setup.

discord:
  token: "YOUR_DISCORD_BOT_TOKEN"
  guildId: "YOUR_DISCORD_SERVER_ID"

harmony:
  token: "YOUR_HARMONY_BOT_TOKEN"
  serverId: "YOUR_HARMONY_SERVER_UUID"
  # Optional — from Harmony Server Settings → Discord Bridge
  # pairingCode: "HRM-XXXX-XXXX"

  # har.mony.lol, bridge on same server:
  gatewayUrl: "ws://localhost:3002/gateway"
  apiUrl: "http://localhost:3002"
  baseUrl: "https://har.mony.lol"

  # har.mony.lol, bridge elsewhere:
  # gatewayUrl: "wss://har.mony.lol/bot-gateway/gateway"
  # apiUrl: "https://har.mony.lol/bot-gateway"
  # baseUrl: "https://har.mony.lol"

  # local dev:
  # gatewayUrl: "ws://localhost:3002/gateway"
  # apiUrl: "http://localhost:3002"
  # baseUrl: "http://localhost:5173"

channelMappings:
  - discord: "1234567890"
    harmony: "uuid-here"
    bidirectional: true
    name: "general"

settings:
  syncAttachments: true   # include attachments in bridged messages
  # Attachment policy (link / refresh / mirror) is set by the INSTANCE ADMIN in
  # the Harmony Admin Panel — not here. refresh re-signs expired Discord URLs on
  # demand (no disk); mirror copies files into user_media (permanent, but grows
  # disk usage). Default is link.
  syncReactions: true
  syncEdits: false
  syncDeletes: false
  mentionTranslation: true
  cloneRoles: false
  syncPermissions: false
  # Mirror Discord presence + custom status in Harmony member list (default: true).
  # Requires "Server Members Intent" + "Presence Intent" in the Discord dev portal.
  syncPresence: true

# ---------------------------------------------------------------------------
# Multi-bridge (optional): one Discord bot token, multiple guild ↔ server pairs
# you operate. Uncomment and remove the single discord.guildId / harmony.serverId
# block above when using this.
# ---------------------------------------------------------------------------
# bridges:
#   - name: "Community A"
#     discordGuildId: "DISCORD_GUILD_ID_A"
#     harmonyServerId: "HARMONY_SERVER_UUID_A"
#     channelMappings:
