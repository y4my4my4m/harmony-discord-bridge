# =============================================================================
# Harmony <-> Discord bridge (standalone)
# =============================================================================
# Run the bridge on its own - it only needs network access to a Harmony
# bot-gateway and a Discord bot token. No Harmony backend or database required.
#
#   1. cp config/bridge-config.example.yml config/bridge-config.yml
#   2. edit config/bridge-config.yml  (tokens, server IDs, channel mappings)
#   3. docker compose up -d
# =============================================================================
services:
  discord-bridge:
    build: .
    image: harmony-discord-bridge:local
    container_name: harmony-discord-bridge
    restart: unless-stopped
    volumes:
      # Mounted read-only; the bridge hot-reloads channel mappings on change.
      - ./config:/app/config:ro
